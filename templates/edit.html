{% extends "base.html" %}
{% block title %}Edit Task — TaskFlow{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-7 col-lg-5">

    <div class="d-flex align-items-center gap-2 mb-3">
      <a href="{{ url_for('index') }}" class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-arrow-left"></i>
      </a>
      <h5 class="mb-0 fw-bold">Edit Task</h5>
    </div>

    <div class="app-card card p-4">
      <form method="POST">

        <div class="mb-3">
          <label class="form-label fw-semibold small">Title</label>
          <input type="text" name="title" class="form-control"
                 value="{{ todo.title }}" required autofocus />
        </div>

        <div class="row g-3 mb-3">
          <div class="col-6">
            <label class="form-label fw-semibold small">Priority</label>
            <select name="priority" class="form-select">
              <option value="low"    {% if todo.priority == 'low'    %}selected{% endif %}>Low</option>
              <option value="medium" {% if todo.priority == 'medium' %}selected{% endif %}>Medium</option>
              <option value="high"   {% if todo.priority == 'high'   %}selected{% endif %}>High</option>
            </select>
          </div>
          <div class="col-6">
            <label class="form-label fw-semibold small">Due Date</label>
            <input type="date" name="due_date" class="form-control"
                   value="{{ todo.due_date or '' }}" />
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold small d-flex align-items-center gap-1">
            <i class="bi bi-lock-fill" style="color:var(--brand)"></i>
            Private Notes
            <span class="badge ms-1 fw-normal" style="background:var(--brand);font-size:.65rem">
              AES-128 encrypted
            </span>
          </label>
          <textarea name="notes" class="form-control notes-input" rows="4"
                    placeholder="Only you can read this — stored encrypted in the database.">{{ notes }}</textarea>
          <div class="form-text">
            <i class="bi bi-shield-check text-success me-1"></i>
            Notes are encrypted with Fernet (AES-128-CBC + HMAC-SHA256) before being saved.
            Leave blank to clear.
          </div>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-brand flex-grow-1">
            <i class="bi bi-floppy me-1"></i>Save Changes
          </button>
          <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">Cancel</a>
        </div>

      </form>
    </div>

  </div>
</div>
{% endblock %}
