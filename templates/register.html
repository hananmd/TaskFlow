{% extends "base.html" %}
{% block title %}Register — TaskFlow{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-sm-9 col-md-6 col-lg-4">
    <div class="app-card card p-4 mt-3">
      <h4 class="fw-bold mb-1" style="color:var(--brand)">
        <i class="bi bi-check2-square me-2"></i>TaskFlow
      </h4>
      <p class="text-muted small mb-4">Create your account</p>

      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-semibold small">Username</label>
          <input type="text" name="username" class="form-control"
                 autocomplete="username" autofocus required />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold small">Email</label>
          <input type="email" name="email" class="form-control"
                 autocomplete="email" required />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold small">Password
            <span class="text-muted fw-normal">(min. 8 characters)</span>
          </label>
          <input type="password" name="password" class="form-control"
                 autocomplete="new-password" required minlength="8" />
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold small">Confirm Password</label>
          <input type="password" name="confirm" class="form-control"
                 autocomplete="new-password" required />
        </div>
        <button type="submit" class="btn btn-brand w-100">
          <i class="bi bi-person-plus me-2"></i>Create Account
        </button>
      </form>
    </div>

    <p class="text-center mt-3 small text-muted">
      Already have an account?
      <a href="{{ url_for('login') }}" style="color:var(--brand)">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
