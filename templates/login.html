{% extends "base.html" %}
{% block title %}Login — TaskFlow{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-sm-9 col-md-6 col-lg-4">
    <div class="app-card card p-4 mt-3">
      <h4 class="fw-bold mb-1" style="color:var(--brand)">
        <i class="bi bi-check2-square me-2"></i>TaskFlow
      </h4>
      <p class="text-muted small mb-4">Sign in to your account</p>

      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-semibold small">Username</label>
          <input type="text" name="username" class="form-control"
                 autocomplete="username" autofocus required />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold small">Password</label>
          <input type="password" name="password" class="form-control"
                 autocomplete="current-password" required />
        </div>
        <div class="d-flex align-items-center justify-content-between mb-4">
          <div class="form-check mb-0">
            <input class="form-check-input" type="checkbox" name="remember" id="remember" />
            <label class="form-check-label small" for="remember">Remember me</label>
          </div>
        </div>
        <button type="submit" class="btn btn-brand w-100">
          <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        </button>
      </form>
    </div>

    <p class="text-center mt-3 small text-muted">
      Don't have an account?
      <a href="{{ url_for('register') }}" style="color:var(--brand)">Create one</a>
    </p>
  </div>
</div>
{% endblock %}
